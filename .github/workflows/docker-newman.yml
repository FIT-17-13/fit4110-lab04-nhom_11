name: Lab04 Docker and Newman Verification

on:
  push:
  pull_request:

jobs:
  docker-newman:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint OpenAPI contract
        run: npm run lint:openapi

      - name: Build Docker image
        run: docker build -t fit4110/iot-ingestion:lab04 .

      - name: Run Docker container
        run: |
          docker run -d \
            --name fit4110-iot-lab04 \
            -p 8000:8000 \
            --env-file .env.example \
            fit4110/iot-ingestion:lab04
          sleep 15

      - name: Check container and wait for health
        run: |
          echo "=== Docker ps ===" 
          docker ps -a --filter "name=fit4110-iot-lab04"
          echo "=== Initial container logs ===" 
          docker logs fit4110-iot-lab04 || echo "No logs yet"
          echo "=== Waiting for health endpoint ==="
          for i in {1..30}; do
            echo "Attempt $i/30"
            curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" http://localhost:8000/health && break
            docker logs fit4110-iot-lab04 | tail -5
            sleep 4
          done
          echo "=== Final health check ==="
          curl -v http://localhost:8000/health

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Run Newman against Docker container
        run: npm run test:local

      - name: Show container logs on failure
        if: failure()
        run: |
          docker ps -a --filter "name=fit4110-iot-lab04"
          docker logs fit4110-iot-lab04 || true

      - name: Stop container
        if: always()
        run: |
          docker stop fit4110-iot-lab04 || true
          docker rm fit4110-iot-lab04 || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lab04-newman-reports
          path: reports/
          if-no-files-found: warn
